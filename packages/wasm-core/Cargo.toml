[package]
name = "trading-ui"
version = "0.1.0"
edition = "2021"
authors = ["Loom Team"]
description = "WASM core for Loom trading UI"

# Standalone workspace (excluded from root)
[workspace]

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = ["console_error_panic_hook"]

[dependencies]
# Local indicators library
loom-indicators = { path = "../indicators", features = ["full"] }

# Chartcore - Chart engine and indicator system
chartcore = { path = "../../crates/chartcore", features = ["wasm"] }

# UUID for panel IDs (js feature required for WASM)
uuid = { version = "1.11", features = ["v4", "serde", "js"] }

wasm-bindgen = "0.2.89"
wasm-bindgen-futures = "0.4.39"
js-sys = "0.3.66"
web-sys = { version = "0.3.66", features = [
    "console",
    "Window",
    "Document",
    "Element",
    "WebSocket",
    "MessageEvent",
    "CloseEvent",
    "ErrorEvent",
    "BinaryType",
] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Async runtime
futures = "0.3"

# Error handling
thiserror = "1.0"
console_error_panic_hook = { version = "0.1.7", optional = true }

# Logging
log = "0.4"
console_log = { version = "1.0", features = ["color"] }

# Date/time handling
chrono = "0.4"

[dev-dependencies]
wasm-bindgen-test = "0.3.39"

[profile.release]
opt-level = "z"      # Optimize for size (smaller than "s")
lto = true           # Link-time optimization
codegen-units = 1    # Better optimization, slower compile
panic = "abort"      # Smaller binary (no unwinding)
strip = true         # Remove debug symbols

[package.metadata.wasm-pack.profile.release]
wasm-opt = false   # Disable wasm-opt due to validation issues
