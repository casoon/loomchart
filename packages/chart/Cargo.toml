[package]
name = "loom-chart"
version = "0.1.0"
edition = "2021"
description = "Chart drawing primitives and plugin system for trading charts"
license = "MIT OR Apache-2.0"
repository = "https://github.com/casoon/loom"
keywords = ["trading", "chart", "visualization", "technical-analysis"]
categories = ["visualization", "finance"]

[features]
default = ["std"]
std = []
serde = ["dep:serde"]
wasm = ["dep:wasm-bindgen", "dep:js-sys"]

[dependencies]
serde = { version = "1.0", default-features = false, features = ["derive"], optional = true }
wasm-bindgen = { version = "0.2", optional = true }
js-sys = { version = "0.3", optional = true }
loom-core = { path = "../core", default-features = false }
loom-signals = { path = "../signals", default-features = false }

[dev-dependencies]
serde_json = "1.0"
