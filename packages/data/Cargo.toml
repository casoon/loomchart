[package]
name = "loom-data"
version = "0.1.0"
edition = "2021"
description = "Data providers for Loom trading platform"
license = "MIT"

[features]
default = ["std"]
std = []
serde = ["dep:serde", "loom-core/serde"]
async = ["tokio", "futures"]
binance = ["async", "reqwest", "tokio-tungstenite"]
csv = ["dep:csv"]
full = ["serde", "async", "binance", "csv"]

[dependencies]
loom-core = { path = "../core" }
serde = { version = "1.0", features = ["derive"], optional = true }
serde_json = { version = "1.0", optional = true }
tokio = { version = "1.0", features = ["full"], optional = true }
futures = { version = "0.3", optional = true }
reqwest = { version = "0.11", features = ["json"], optional = true }
tokio-tungstenite = { version = "0.21", optional = true }
csv = { version = "1.3", optional = true }
chrono = { version = "0.4", features = ["serde"] }
thiserror = "1.0"

[dev-dependencies]
tokio-test = "0.4"
