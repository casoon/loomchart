[package]
name = "loom-signals"
version = "0.1.0"
edition = "2021"
description = "Signal DSL and trading rules: cross_over, above, slope, and pattern detection"
license = "MIT OR Apache-2.0"
repository = "https://github.com/casoon/loom"
keywords = ["trading", "signals", "technical-analysis", "wyckoff", "elliott-wave"]
categories = ["finance", "algorithms"]

[features]
default = ["std"]
std = []
serde = ["dep:serde"]

[dependencies]
serde = { version = "1.0", default-features = false, features = ["derive"], optional = true }
loom-core = { path = "../core", default-features = false }

[dev-dependencies]
