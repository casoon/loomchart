app = "loom-capital-feed"
primary_region = "fra"

[build]

[env]
  CAPITAL_SYMBOL = "NATURALGAS"
  CAPITAL_SOURCE = "capitalcom"

[[services]]
  internal_port = 8080
  protocol = "tcp"

[[services.ports]]
  port = 80

[experimental]
  auto_rollback = true

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
